syntax = "proto3";

package book;

// BookService — owns book documents, cover-image objects (via MinIO),
// and the availability state field (Available / Reserved / Lent Out).
//
// Field naming convention: snake_case (preserved by protoLoader's
// keepCase: true option).

service BookService {
  rpc AddBook (AddBookRequest) returns (AddBookResponse);
  rpc GetBook (GetBookRequest) returns (GetBookResponse);
  rpc EditBook (EditBookRequest) returns (EditBookResponse);
  rpc ReplaceCover (ReplaceCoverRequest) returns (ReplaceCoverResponse);
  rpc GetCoverBytes (GetCoverBytesRequest) returns (GetCoverBytesResponse);
  rpc ListBooksByOwner (ListBooksByOwnerRequest) returns (ListBooksByOwnerResponse);
}

message Book {
  string id = 1;
  string owner_id = 2;
  string title = 3;
  string author = 4;
  int32  year_published = 5;
  string cover_object_key = 6;
  string status = 7;          // "Available" | "Reserved" | "Lent Out"
  string created_at = 8;      // ISO 8601
  string updated_at = 9;      // ISO 8601
}

message AddBookRequest {
  string owner_id = 1;
  string title = 2;
  string author = 3;
  int32  year_published = 4;
  bytes  cover_image_bytes = 5;
  string cover_content_type = 6;
}

message AddBookResponse {
  Book book = 1;
}

message GetCoverBytesRequest {
  string object_key = 1;
}

message GetCoverBytesResponse {
  bytes  content = 1;
  string content_type = 2;
}

message ListBooksByOwnerRequest {
  string owner_id = 1;
  int32  limit = 2;   // 0 = no limit; ignored in v1 (returns all)
  int32  offset = 3;  // ignored in v1
}

message ListBooksByOwnerResponse {
  repeated Book books = 1;
}

message GetBookRequest {
  string book_id = 1;
}

message GetBookResponse {
  Book book = 1;
}

message EditBookRequest {
  string book_id = 1;
  string title = 2;
  string author = 3;
  int32  year_published = 4;
}

message EditBookResponse {
  Book book = 1;
}

message ReplaceCoverRequest {
  string book_id = 1;
  bytes  cover_image_bytes = 2;
  string cover_content_type = 3;
}

message ReplaceCoverResponse {
  Book book = 1;
}
