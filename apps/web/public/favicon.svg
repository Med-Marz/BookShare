<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bordeaux circle background matching the navbar logo. -->
  <circle cx="32" cy="32" r="32" fill="#7B2D26"/>
  <!-- Open-book glyph in ivory (lucide BookOpen, scaled and centered). -->
  <g stroke="#FAF7F2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spine -->
    <path d="M32 22 V50"/>
    <!-- Left page: from spine, curves up, then up and right to the top -->
    <path d="M32 22 a6 6 0 0 0 -6 -6 H17 a1.5 1.5 0 0 0 -1.5 1.5 V44 a1.5 1.5 0 0 0 1.5 1.5 H26 a6 6 0 0 1 6 4.5"/>
    <!-- Right page (mirror) -->
    <path d="M32 22 a6 6 0 0 1 6 -6 H47 a1.5 1.5 0 0 1 1.5 1.5 V44 a1.5 1.5 0 0 1 -1.5 1.5 H38 a6 6 0 0 0 -6 4.5"/>
  </g>
</svg>
