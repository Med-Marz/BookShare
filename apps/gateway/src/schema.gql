# BookShare GraphQL schema.
# Loaded by apps/gateway/src/index.js via fs.readFileSync.
# Types grow story by story.

type User {
  id: ID!
  # email/phone/address are nullable: the public `user(id)` query nulls them
  # out for anonymous viewers per the contact-info gating rule (story 1.5).
  # Authenticated queries (signup, login, profile, user) populate them.
  email: String
  display_name: String!
  phone: String
  address: String
  created_at: String
}

type AuthPayload {
  token: String!
  user: User!
}

input SignupInput {
  email: String!
  password: String!
  display_name: String!
  phone: String!
  address: String!
}

input UpdateProfileInput {
  display_name: String
  phone: String
  address: String
}

type Query {
  # Heartbeat field — always returns null. Removed once we have richer queries.
  _empty: String

  # The authenticated user's full profile. Requires a valid JWT.
  profile: User!

  # Any user's public profile. Reachable anonymously, but email/phone/address
  # are nulled out for anonymous callers (FR10 contact-info gating).
  user(id: ID!): User!
}

type Mutation {
  signup(input: SignupInput!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  updateProfile(input: UpdateProfileInput!): User!
}
