server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — React Router handles every path client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for fingerprinted Vite assets, short cache for the index.
  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }
}
