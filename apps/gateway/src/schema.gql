# BookShare GraphQL schema.
# Loaded by apps/gateway/src/index.js via fs.readFileSync.
# Types grow story by story.

type User {
  id: ID!
  # email/phone/address are nullable: the public `user(id)` query nulls them
  # out for anonymous viewers (contact-info gating).
  # Authenticated queries (signup, login, profile, user) populate them.
  email: String
  display_name: String!
  phone: String
  address: String
  created_at: String
  # Books listed by this user — resolved by fanning out to book-service.
  # Returns an empty array if the user has none.
  books: [Book!]!
}

type AuthPayload {
  token: String!
  user: User!
}

input SignupInput {
  email: String!
  password: String!
  display_name: String!
  phone: String!
  address: String!
}

input UpdateProfileInput {
  display_name: String
  phone: String
  address: String
}

type Query {
  # Heartbeat field — always returns null. Removed once we have richer queries.
  _empty: String

  # The authenticated user's full profile. Requires a valid JWT.
  profile: User!

  # Any user's public profile. Reachable anonymously, but email/phone/address
  # are nulled out for anonymous callers (FR10 contact-info gating).
  user(id: ID!): User!
}

type Mutation {
  signup(input: SignupInput!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  updateProfile(input: UpdateProfileInput!): User!
  addBook(input: AddBookInput!): Book!
  editBook(id: ID!, input: EditBookInput!): Book!
  deleteBook(id: ID!): Boolean!
}

extend type Query {
  book(id: ID!): Book!
  recentBooks(limit: Int = 12): [Book!]!
  books(limit: Int = 24, cursor: String = ""): BookPage!
  search(q: String!): SearchResult!
}

type BookPage {
  edges: [Book!]!
  next_cursor: String!
}

type SearchResult {
  books: [SearchBook!]!
}

type SearchBook {
  id: ID!
  owner_id: ID!
  owner: User!
  title: String!
  author: String!
  year_published: Int!
  cover_object_key: String!
  status: String!
  matched_by: [String!]!
}

type Book {
  id: ID!
  owner_id: ID!
  # The owning user — resolved by fanning out to user-service. Anonymous
  # viewers see contact fields nulled per the same gating rule as user(id).
  owner: User!
  title: String!
  author: String!
  year_published: Int!
  cover_object_key: String!
  status: String!
  created_at: String!
  updated_at: String!
  # Placeholder until reservations come online — currently always null.
  my_active_reservation: Reservation
}

type Reservation {
  id: ID!
  book_id: ID!
  owner_id: ID!
  borrower_id: ID!
  state: String!
  created_at: String!
  loan_started_at: String
  returned_at: String
  cancelled_at: String
}

extend type Mutation {
  reserveBook(book_id: ID!): Reservation!
  cancelReservation(id: ID!): Reservation!
  startLoan(id: ID!): Reservation!
  markReturned(id: ID!): Reservation!
}

extend type Query {
  myReservations: [Reservation!]!
  ownedReservations: [Reservation!]!
  me: Me!
}

type Me {
  activity: Activity!
}

type Activity {
  active_reservation_count: Int!
  listed_book_count: Int!
}

extend type Reservation {
  book: Book
  owner: User
  borrower: User
}

input AddBookInput {
  title: String!
  author: String!
  year_published: Int!
  cover_base64: String!         # base64-encoded image bytes
  cover_content_type: String!   # image/jpeg | image/png | image/webp
}

input EditBookInput {
  title: String
  author: String
  year_published: Int
}

extend type Query {
  notifications(limit: Int = 20, since: String): [Notification!]!
  unreadNotificationCount: Int!
}

extend type Mutation {
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: Int!
}

type Notification {
  id: ID!
  topic: String!
  actor_id: ID!
  book_id: ID!
  reservation_id: ID!
  message: String!
  occurred_at: String!
  created_at: String!
  read_at: String
}
