syntax = "proto3";

package user;

// UserService — owns accounts, authentication, and profile (display name,
// phone, postal address). Called by the API gateway only.
//
// Field naming convention: snake_case (preserved by protoLoader's
// keepCase: true option).

service UserService {
  // Create a new account from signup form data. Story 1.2.
  // Returns the persisted user; the gateway signs the JWT separately
  // (user-service does not hold JWT_SECRET).
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Verify an email + password pair. Story 1.3.
  // On success: returns the user. On any failure (unknown email,
  // wrong password, malformed input): gRPC UNAUTHENTICATED with a
  // generic message — never enumerate which field failed.
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);

  // Look up a user by id. Story 1.4.
  // Returns NOT_FOUND when the id has no row.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // Update editable profile fields. Story 1.4.
  // The handler enforces that x-user-id metadata matches the request user_id
  // (PERMISSION_DENIED otherwise) and that the email field stays immutable.
  // Empty-string scalars are treated as "leave unchanged" — at least one of
  // display_name, phone, address must be non-empty (INVALID_ARGUMENT otherwise).
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string phone = 4;
  string address = 5;
  string created_at = 6;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  string phone = 4;
  string address = 5;
}

message CreateUserResponse {
  User user = 1;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateUserResponse {
  User user = 1;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  // Empty string = "do not update this field". At least one of these must
  // be non-empty or the handler returns INVALID_ARGUMENT.
  string display_name = 2;
  string phone = 3;
  string address = 4;
}

message UpdateUserResponse {
  User user = 1;
}
