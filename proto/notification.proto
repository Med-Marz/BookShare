syntax = "proto3";

package notification;

// NotificationService — Kafka consumer on all four business topics; persists
// each consumed event as a mock notification row in its own SQLite database
// and serves recent notifications back over gRPC.
//
// Field naming convention: snake_case (preserved by protoLoader's
// keepCase: true option).

service NotificationService {
  rpc ListNotifications (ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead (MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
  rpc MarkAllNotificationsRead (MarkAllNotificationsReadRequest) returns (MarkAllNotificationsReadResponse);
  rpc CountUnreadNotifications (CountUnreadNotificationsRequest) returns (CountResponse);
}

message Notification {
  string id = 1;
  string event_id = 2;
  string topic = 3;
  string recipient_actor_id = 4;
  string actor_id = 5;
  string book_id = 6;
  string reservation_id = 7;
  string message = 8;
  string occurred_at = 9;
  string created_at = 10;
  string read_at = 11;            // empty when unread
}

message ListNotificationsRequest {
  string recipient_actor_id = 1;
  int32 limit = 2;
  string since = 3;               // ISO8601; empty means no lower bound
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
  string requester_id = 2;
}

message MarkNotificationReadResponse {
  Notification notification = 1;
}

message MarkAllNotificationsReadRequest {
  string requester_id = 1;
}

message MarkAllNotificationsReadResponse {
  int32 updated_count = 1;
}

message CountUnreadNotificationsRequest {
  string recipient_actor_id = 1;
}

message CountResponse {
  int32 count = 1;
}
