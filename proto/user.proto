syntax = "proto3";

package user;

// UserService — owns accounts, authentication, and profile (display name,
// phone, postal address). Called by the API gateway only.
//
// Field naming convention: snake_case (preserved by protoLoader's
// keepCase: true option).

service UserService {
  // Create a new account from signup form data. Story 1.2.
  // Returns the persisted user; the gateway signs the JWT separately
  // (user-service does not hold JWT_SECRET).
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Verify an email + password pair. Story 1.3.
  // On success: returns the user. On any failure (unknown email,
  // wrong password, malformed input): gRPC UNAUTHENTICATED with a
  // generic message — never enumerate which field failed.
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);

  // TODO: GetUser, UpdateUser (story 1.4)
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string phone = 4;
  string address = 5;
  string created_at = 6;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  string phone = 4;
  string address = 5;
}

message CreateUserResponse {
  User user = 1;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateUserResponse {
  User user = 1;
}
